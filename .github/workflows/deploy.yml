name: Deploy Docs to universaldot.github.io

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version:
          - 24.x

    steps:
      # Updated to Node 24 compatible version
      - name: Checkout repository
        uses: actions/checkout@v4

      # Re-enable setup-node using latest version
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
          cache-dependency-path: wiki/yarn.lock

      - name: Install Yarn dependencies
        working-directory: ./wiki
        run: yarn install --frozen-lockfile

      - name: Build Docusaurus
        working-directory: ./wiki
        run: yarn build

      # Updated to latest maintained version
      - name: Deploy build directory to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: UniversalDot/universaldot.github.io
          publish_branch: master
